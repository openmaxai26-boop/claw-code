<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claw Code — AI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; }
    header .badge {
      background: #2d2d2d;
      border: 1px solid #444;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.75rem;
      color: #888;
    }
    .model-select {
      margin-left: auto;
      background: #2d2d2d;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      max-width: 780px;
      width: 100%;
    }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }
    .msg .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    .msg .meta {
      font-size: 0.72rem;
      color: #555;
      margin-top: 4px;
      padding: 0 4px;
    }
    .msg.user .meta { text-align: right; }
    .typing { display: flex; align-items: center; gap: 6px; padding: 12px 16px; }
    .typing span {
      width: 8px; height: 8px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }
    #input-area {
      background: #1a1a1a;
      border-top: 1px solid #333;
      padding: 16px 20px;
    }
    #api-key-area {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    #api-key-input {
      flex: 1;
      background: #2d2d2d;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
    }
    #api-key-input::placeholder { color: #555; }
    #input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      background: #2d2d2d;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      font-family: inherit;
      line-height: 1.5;
    }
    #user-input:focus { outline: none; border-color: #2563eb; }
    #user-input::placeholder { color: #555; }
    #send-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #333; cursor: not-allowed; }
    .error-msg {
      background: #3d1515;
      border: 1px solid #8b2020;
      color: #ffaaaa;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
    }
    code {
      background: #2d2d2d;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.88em;
    }
    pre {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    pre code { background: none; padding: 0; }
    #welcome {
      text-align: center;
      padding: 40px 20px;
      color: #444;
    }
    #welcome h2 { font-size: 1.4rem; color: #666; margin-bottom: 8px; }
    #welcome p { font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>Claw Code</h1>
    <span class="badge">Powered by Claude</span>
    <select class="model-select" id="model-select">
      <option value="claude-opus-4-5">claude-opus-4-5</option>
      <option value="claude-sonnet-4-5">claude-sonnet-4-5</option>
      <option value="claude-haiku-3-5">claude-haiku-3-5</option>
      <option value="claude-3-opus-20240229">claude-3-opus</option>
      <option value="claude-3-5-sonnet-20241022">claude-3-5-sonnet</option>
    </select>
  </header>

  <div id="chat">
    <div id="welcome">
      <h2>Bienvenue sur Claw Code</h2>
      <p>Entrez votre clé API Anthropic ci-dessous pour commencer à chatter.</p>
    </div>
  </div>

  <div id="input-area">
    <div id="api-key-area">
      <input type="password" id="api-key-input" placeholder="🔑 Clé API Anthropic (sk-ant-...)" autocomplete="off" />
    </div>
    <div id="input-row">
      <textarea id="user-input" placeholder="Envoyez un message..." rows="1"></textarea>
      <button id="send-btn" title="Envoyer">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const apiKeyInput = document.getElementById('api-key-input');
    const modelSelect = document.getElementById('model-select');
    const welcome = document.getElementById('welcome');

    let messages = [];
    let isLoading = false;

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
    });

    // Send on Enter (Shift+Enter for newline)
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    // Save API key to localStorage
    const savedKey = localStorage.getItem('claw_api_key');
    if (savedKey) apiKeyInput.value = savedKey;
    apiKeyInput.addEventListener('change', () => {
      localStorage.setItem('claw_api_key', apiKeyInput.value);
    });

    function addMessage(role, content, meta) {
      if (welcome) welcome.style.display = 'none';
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;
      div.appendChild(bubble);
      if (meta) {
        const m = document.createElement('div');
        m.className = 'meta';
        m.textContent = meta;
        div.appendChild(m);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function addTyping() {
      const div = document.createElement('div');
      div.className = 'msg assistant';
      div.innerHTML = '<div class="bubble typing"><span></span><span></span><span></span></div>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      const apiKey = apiKeyInput.value.trim();
      if (!text || isLoading) return;
      if (!apiKey) {
        apiKeyInput.focus();
        apiKeyInput.style.borderColor = '#e53e3e';
        setTimeout(() => apiKeyInput.style.borderColor = '', 2000);
        return;
      }

      messages.push({ role: 'user', content: text });
      addMessage('user', text);
      userInput.value = '';
      userInput.style.height = 'auto';
      isLoading = true;
      sendBtn.disabled = true;

      const typingEl = addTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: messages,
            model: modelSelect.value,
            api_key_override: apiKey
          })
        });

        const data = await res.json();
        typingEl.remove();

        if (data.error) {
          const errText = typeof data.error === 'object' ? JSON.stringify(data.error) : data.error;
          const div = document.createElement('div');
          div.className = 'msg assistant';
          div.innerHTML = '<div class="error-msg">⚠️ Erreur: ' + errText + '</div>';
          chat.appendChild(div);
        } else {
          messages.push({ role: 'assistant', content: data.reply });
          const usage = data.usage;
          const meta = usage ? `${data.model} • ${usage.input_tokens} in / ${usage.output_tokens} out tokens` : data.model;
          addMessage('assistant', data.reply, meta);
        }
      } catch (e) {
        typingEl.remove();
        const div = document.createElement('div');
        div.className = 'msg assistant';
        div.innerHTML = '<div class="error-msg">⚠️ Erreur réseau: ' + e.message + '</div>';
        chat.appendChild(div);
      }

      isLoading = false;
      sendBtn.disabled = false;
      chat.scrollTop = chat.scrollHeight;
    }
  </script>
</body>
</html>
